<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/universe.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universe Simulation</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Diagnostic: surface any unhandled errors before React mounts
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        var msg = r ? (r.stack || String(r)) : 'Unknown rejection';
        
        // Ignore pointer lock errors (expected in automated/restricted contexts)
        if (msg.includes('pointer lock') || msg.includes('WrongDocumentError')) {
          console.warn('[Universe Sim] Pointer lock error (ignoring):', msg);
          e.preventDefault();
          // Signal to React that pointer lock failed - set a global flag
          window.__POINTER_LOCK_FAILED__ = true;
          return;
        }
        
        document.getElementById('root').innerHTML =
          '<pre style="color:#f55;background:#111;padding:24px;font:13px monospace;position:fixed;inset:0;z-index:9999;overflow:auto;white-space:pre-wrap"><b>UNHANDLED REJECTION — UNIVERSE SIM</b>\n\n' + msg + '</pre>';
      });
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#f55;background:#111;padding:24px;font:13px monospace;position:fixed;inset:0;z-index:9999;overflow:auto;white-space:pre-wrap"><b>UNCAUGHT ERROR — UNIVERSE SIM</b>\n\n' + (err ? (err.stack || String(err)) : msg) + '</pre>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

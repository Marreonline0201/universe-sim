<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 3 — System Connection Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(10, 10, 15, 0.95);
    border-bottom: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  #header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #a0a0c0;
    white-space: nowrap;
  }

  #header .legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #707090;
  }

  #header .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  #header .legend-item:hover { opacity: 1; }
  #header .legend-item.dimmed { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  #header .stats {
    margin-left: auto;
    font-size: 11px;
    color: #505070;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  #graph-container {
    width: 100vw;
    height: 100vh;
    padding-top: 48px;
  }

  svg { display: block; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(15, 15, 25, 0.97);
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 14px 18px;
    max-width: 420px;
    font-size: 12px;
    line-height: 1.6;
    color: #c0c0d0;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #tooltip.visible { opacity: 1; }

  #tooltip .tt-title {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }

  #tooltip .tt-section {
    font-size: 10px;
    color: #606080;
    margin-bottom: 8px;
    font-family: 'Cascadia Code', monospace;
  }

  #tooltip .tt-connections {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #1a1a2e;
  }

  #tooltip .tt-conn-item {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 11px;
  }

  #tooltip .tt-conn-id {
    color: #808090;
    font-family: monospace;
    min-width: 18px;
  }

  #tooltip .tt-severity-critical { color: #ff6b6b; }
  #tooltip .tt-severity-moderate { color: #ffd166; }

  /* Side panel for connection detail */
  #detail-panel {
    position: fixed;
    top: 48px;
    right: 0;
    width: 380px;
    height: calc(100vh - 48px);
    background: rgba(10, 10, 18, 0.98);
    border-left: 1px solid #1a1a2e;
    padding: 20px;
    overflow-y: auto;
    z-index: 150;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    backdrop-filter: blur(12px);
  }

  #detail-panel.open { transform: translateX(0); }

  #detail-panel .dp-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #606080;
    font-size: 18px;
    cursor: pointer;
  }

  #detail-panel .dp-close:hover { color: #fff; }

  #detail-panel .dp-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    padding-right: 30px;
  }

  #detail-panel .dp-severity {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 14px;
  }

  #detail-panel .dp-severity.critical {
    background: rgba(255, 107, 107, 0.15);
    color: #ff6b6b;
  }

  #detail-panel .dp-severity.moderate {
    background: rgba(255, 209, 102, 0.15);
    color: #ffd166;
  }

  #detail-panel .dp-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #505070;
    margin-top: 16px;
    margin-bottom: 4px;
  }

  #detail-panel .dp-value {
    font-size: 12px;
    color: #b0b0c8;
    line-height: 1.6;
  }

  #detail-panel .dp-ref {
    font-size: 11px;
    font-family: 'Cascadia Code', monospace;
    color: #6080c0;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #1a1a2e;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Chapter 3 &mdash; System Connection Map</h1>
  <div class="legend" id="legend"></div>
  <div class="stats" id="stats"></div>
</div>

<div id="graph-container"></div>
<div id="tooltip"></div>
<div id="detail-panel">
  <button class="dp-close" onclick="closeDetail()">&times;</button>
  <div id="detail-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════

const groups = {

  { id: "npc-brain",         label: "NPC Brain / SLM (5.3)",       group: "world", section: "5.3", desc: "Small language model, personality, memory, decisions" },

  // Crafting
  { id: "crafting",          label: "Crafting / Interaction (6.4)",  group: "crafting", section: "6.4", desc: "Workstation actions, material transformation" },
  { id: "precision-craft",   label: "Precision Craft Mode",         group: "crafting", section: "6.4", desc: "Mesh deformation, functional properties (volume, wall thickness, sharpness)" },
  { id: "sdf-collision",     label: "Crafted Object SDF Collision", group: "crafting", section: "3.2", desc: "Signed distance fields for particle-mesh collision in containers" },

  // Player
  { id: "player-health",     label: "Player Health / Survival (7.2)", group: "player", section: "7.2", desc: "Body temperature, hunger, thirst, bleeding, drowning" },
  { id: "player-inventory",  label: "Player Inventory (7.3)",       group: "player", section: "7.3", desc: "Carried items, weight, tool durability" },
  { id: "player-combat",     label: "Combat System (7.5)",          group: "player", section: "7.5", desc: "Damage calculation, sharpness, armor, bleed rate" },
  { id: "player-movement",   label: "Player Movement (7.5)",        group: "player", section: "7.5", desc: "Speed, stamina, swimming, snow depth effects" },
  { id: "world-persistence", label: "World Persistence (7.12)",     group: "player", section: "7.12", desc: "Chunk saving, terrain modification, structure durability" },
];

const connections = [
  // Critical (1-15)
  { id: 1,  source: "physics-tick",     target: "sound-engine",      severity: "critical", name: "Sound Event Generation", data: "Physical events → SoundEvent descriptors (material, energy, geometry)" },
  { id: 2,  source: "weather",          target: "shelter-map",       severity: "critical", name: "Weather Shelter Detection", data: "Raycasts → shelterMap grid → affects rain, wind, temperature exposure" },
  { id: 2,  source: "shelter-map",      target: "player-health",     severity: "critical", name: "Weather Shelter Detection", data: "Shelter status → body heat loss rate, rain absorption" },
  { id: 2,  source: "shelter-map",      target: "sound-engine",      severity: "critical", name: "Weather Shelter Detection", data: "Shelter → sound reverb characteristics" },
  { id: 3,  source: "animals",          target: "material-system",   severity: "critical", name: "Death → MaterialPacket", data: "Dead organisms → CorpseEntity → harvestable packets (meat, hide, bone)" },
  { id: 3,  source: "animals",          target: "player-inventory",  severity: "critical", name: "Death → MaterialPacket", data: "Harvest yield depends on tool sharpness" },
  { id: 4,  source: "animals",          target: "farming",           severity: "critical", name: "Animal Manure Production", data: "DungPacket (N/P/K content) → soil nutrient enrichment" },
  { id: 5,  source: "npc-brain",        target: "reaction-engine",   severity: "critical", name: "NPC Crafting API", data: "attemptCraft() → same reaction engine for NPC and player" },
  { id: 5,  source: "crafting",         target: "reaction-engine",   severity: "critical", name: "Player Crafting API", data: "attemptCraft() → same reaction engine for NPC and player" },
  { id: 6,  source: "npc-brain",        target: "structural",        severity: "critical", name: "NPC Building Placement", data: "BuildingTemplate → per-block placement → structural integrity check" },
  { id: 6,  source: "npc-brain",        target: "world-persistence", severity: "critical", name: "NPC Building Placement", data: "Placed blocks persist in world chunks" },
  { id: 7,  source: "temp-propagation", target: "structural",        severity: "critical", name: "Fire Spread", data: "Stefan-Boltzmann heat radiation → neighbor ignition → chain fire" },
  { id: 8,  source: "weather",          target: "fluid-sim",         severity: "critical", name: "Rain → Physical Water", data: "precipitationRate → grid waterVolume + soil absorption" },
  { id: 8,  source: "weather",          target: "farming",           severity: "critical", name: "Rain → Soil Moisture", data: "precipitationRate → soil moisture for crops" },
  { id: 9,  source: "fluid-sim",        target: "weather",           severity: "critical", name: "Evaporation → Humidity", data: "Water surfaces → Penman evaporation → atmosphere humidity → clouds → rain" },
  { id: 10, source: "precision-craft",  target: "crafting",          severity: "critical", name: "Precision → Functional Props", data: "Mesh voxelized → volume, wallThickness, symmetry → stored on object" },
  { id: 11, source: "precision-craft",  target: "player-combat",     severity: "critical", name: "Sharpness Property", data: "Edge radius → sharpness value → cutting power + bleed rate" },
  { id: 12, source: "player-combat",    target: "player-inventory",  severity: "critical", name: "Combat → Durability", data: "Impact stress vs tensileStrength → tool/armor wear or shatter" },
  { id: 13, source: "player-combat",    target: "player-health",     severity: "critical", name: "Combat → Bleed Rate", data: "damage × sharpness × 0.5 = bleedRate (HP/min)" },
  { id: 14, source: "settlement",       target: "npc-brain",         severity: "critical", name: "Barter Exchange Rate", data: "needWeight / (stockpile+1) → dynamic pricing from scarcity" },
  { id: 15, source: "npc-brain",        target: "player-inventory",  severity: "critical", name: "Player-NPC Trade", data: "Ground drop → NPC evaluates → reciprocal drop (no UI)" },
  { id: 15, source: "npc-brain",        target: "settlement",        severity: "critical", name: "Player-NPC Trade", data: "Trade items enter/leave settlement stockpile" },

  // Moderate (16-31)
  { id: 16, source: "weather",          target: "structural",        severity: "moderate", name: "Wind → Structural Force", data: "windForce = 0.5 × ρ × v² × A × Cd → shear stress on walls" },
  { id: 17, source: "weather",          target: "npc-brain",         severity: "moderate", name: "Weather → NPC Brain", data: "Numeric weather → categorical string → SLM context (seek shelter, light fire)" },
  { id: 18, source: "weather",          target: "structural",        severity: "moderate", name: "Lightning Effects", data: "Height+conductivity → strike → 500°C spike → possible ignition" },
  { id: 18, source: "weather",          target: "player-health",     severity: "moderate", name: "Lightning Effects", data: "Direct hit ~95% lethal" },
  { id: 19, source: "weather",          target: "player-movement",   severity: "moderate", name: "Snow → Movement Speed", data: "snowDepth → speedMultiplier + stamina drain" },
  { id: 20, source: "farming",          target: "organisms",         severity: "moderate", name: "Pest System", data: "Monoculture → pest probability → crop damage (birds provide control)" },
  { id: 21, source: "weather",          target: "farming",           severity: "moderate", name: "Soil Erosion", data: "precip × slope × (1-vegCover) → nutrient loss (terracing prevents)" },
  { id: 22, source: "player-inventory", target: "player-health",     severity: "moderate", name: "Clothing Warmth", data: "Sum worn warmth → heatLoss reduction; wet clothing loses warmth" },
  { id: 23, source: "player-inventory", target: "player-movement",   severity: "moderate", name: "Swimming Buoyancy", data: "baseBuoyancy - (carriedWeight/maxCarry) × 0.4 → drowning risk" },
  { id: 24, source: "sound-engine",     target: "player-health",     severity: "moderate", name: "Sleep Wake Threshold", data: "perceivedLoudness > 0.1 → wake; fatigue affects threshold" },
  { id: 25, source: "fluid-sim",        target: "networking",        severity: "moderate", name: "Video Mode SPH Check", data: "Active particles >200 within 10m → GPU video mode" },
  { id: 26, source: "networking",       target: "tier-rendering",    severity: "moderate", name: "ENVIRONMENT_STATE Schema", data: "~425 bytes at 1Hz: weather, sun, fires, rivers, time" },
  { id: 27, source: "geology",          target: "fluid-sim",         severity: "moderate", name: "Volcanic Eruption", data: "zoneActivity × 0.001/month → MPM particles (up to 200k)" },
  { id: 27, source: "geology",          target: "settlement",        severity: "moderate", name: "Volcanic Eruption", data: "NPCs flee; settlements may be buried; fertile soil after" },
  { id: 28, source: "geology",          target: "organisms",         severity: "moderate", name: "Biome → Organism Spawning", data: "Biome affinity → initial species distribution at world gen" },
  { id: 29, source: "crafting",         target: "player-health",     severity: "moderate", name: "Cooking → Calories", data: "Temperature ranges → calorie multiplier (1.0× raw to 2.0× cooked)" },
  { id: 30, source: "npc-brain",        target: "npc-brain",         severity: "moderate", name: "NPC Fitness Changes", data: "+0.0001/action, -0.00005/day decay; age caps potential" },
  { id: 31, source: "world-persistence",target: "npc-brain",         severity: "moderate", name: "NPC Structural Decay", data: "durability < 0.7 → maintenanceNeeds → NPC repairs" },

  // INTERNAL fluid sim connections (new particle system)
  { id: 100, source: "fluid-sim",       target: "sph-crafting",      severity: "internal", name: "Crafting Scale Dispatch", data: "Phase transition at workstation → SPH solver at 60Hz" },
  { id: 101, source: "fluid-sim",       target: "mpm-environment",   severity: "internal", name: "Environment Scale Dispatch", data: "Rain, lava, puddles → MLS-MPM solver at 30Hz" },
  { id: 102, source: "sph-crafting",    target: "tier-rendering",    severity: "internal", name: "Tier 1: Marching Cubes", data: "≤5k particles → 32³ scalar field → isosurface mesh" },
  { id: 103, source: "mpm-environment", target: "tier-rendering",    severity: "internal", name: "Tier 2: Screen-Space Fluid", data: "Depth sprites → bilateral blur → smooth surface" },
  { id: 104, source: "particle-redis",  target: "sph-crafting",      severity: "internal", name: "Redistribution → SPH", data: "Split/merge to maintain even spacing near camera" },
  { id: 104, source: "particle-redis",  target: "mpm-environment",   severity: "internal", name: "Redistribution → MPM", data: "Adaptive zones: 0.02m near, 0.16m far" },
  { id: 105, source: "material-system", target: "optical-pipeline",  severity: "internal", name: "Composition → Optics", data: "Beer-Lambert absorption, Arago-Biot refraction, Planck emission" },
  { id: 106, source: "optical-pipeline",target: "tier-rendering",    severity: "internal", name: "Optics → Shading", data: "absorptionRGB + refractiveIndex + scatteringRGB + emissionRGB" },
  { id: 107, source: "fluid-sim",       target: "secondary-particles", severity: "internal", name: "Physics → Secondary", data: "Weber>40→spray, vorticity→foam, reactions→bubbles" },
  { id: 108, source: "phase-transitions",target: "fluid-sim",        severity: "internal", name: "Phase → Particles", data: "Solid→liquid: spawn SPH. Liquid→solid: merge back." },
  { id: 109, source: "scale-transitions",target: "fluid-sim",        severity: "internal", name: "Scale Transition", data: "SPH↔grid: particle absorption/emission at velocity threshold" },
  { id: 110, source: "sph-crafting",    target: "sdf-collision",     severity: "internal", name: "Particle-Mesh Collision", data: "SDF sampling → push particle to surface, apply friction" },
  { id: 111, source: "fluid-sim",       target: "network-streaming", severity: "internal", name: "Sim → Network", data: "Delta-compressed positions, spatial LOD tiers" },
  { id: 112, source: "network-streaming",target: "tier-rendering",   severity: "internal", name: "Network → Render", data: "Client receives particles, fills gaps with ghost particles" },
  { id: 113, source: "material-system",  target: "phase-transitions", severity: "internal", name: "Material → Phase", data: "meltingPoint(composition) determines transition temperature" },
  { id: 114, source: "reaction-engine",  target: "secondary-particles", severity: "internal", name: "Reactions → Bubbles", data: "Gas products inside liquid → bubble particles" },
];

// ══════════════════════════════════════════════════════════════════
// BUILD GRAPH
// ══════════════════════════════════════════════════════════════════

const width = window.innerWidth;
const height = window.innerHeight - 48;

// Build legend
const legendEl = document.getElementById("legend");
Object.entries(groups).forEach(([key, g]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.dataset.group = key;
  item.innerHTML = `<div class="legend-dot" style="background:${g.color}"></div>${g.label}`;
  item.onclick = () => toggleGroup(key);
  legendEl.appendChild(item);
});

// Add internal legend item
const intItem = document.createElement("div");
intItem.className = "legend-item";
intItem.dataset.group = "internal";
intItem.innerHTML = `<div class="legend-dot" style="background:#3a3a5e"></div>Internal (3.2)`;
intItem.onclick = () => toggleGroup("internal");
legendEl.appendChild(intItem);

document.getElementById("stats").textContent = `${nodes.length} nodes  |  ${connections.length} edges  |  31 connections`;

const svg = d3.select("#graph-container")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

// Arrow markers
const defs = svg.append("defs");
["critical", "moderate", "internal", "highlight"].forEach(type => {
  const colors = { critical: "#ff6b6b", moderate: "#ffd166", internal: "#3a3a5e", highlight: "#fff" };
  defs.append("marker")
    .attr("id", `arrow-${type}`)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 20)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L10,0L0,4")
    .attr("fill", colors[type]);
});

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

// Force simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(connections).id(d => d.id).distance(d => {
    if (d.severity === "internal") return 60;
    if (d.severity === "critical") return 120;
    return 150;
  }).strength(d => d.severity === "internal" ? 0.8 : 0.3))
  .force("charge", d3.forceManyBody().strength(d => {
    if (d.id === "fluid-sim" || d.id === "physics-tick") return -600;
    return -350;
  }))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide(35))
  .force("x", d3.forceX(width / 2).strength(0.03))
  .force("y", d3.forceY(height / 2).strength(0.03));

// Draw edges
const link = g.append("g")
  .selectAll("line")
  .data(connections)
  .join("line")
  .attr("stroke", d => {
    if (d.severity === "critical") return "#ff6b6b";
    if (d.severity === "moderate") return "#ffd166";
    return "#2a2a4e";
  })
  .attr("stroke-width", d => d.severity === "critical" ? 1.8 : d.severity === "moderate" ? 1.2 : 0.7)
  .attr("stroke-opacity", d => d.severity === "internal" ? 0.4 : 0.6)
  .attr("marker-end", d => `url(#arrow-${d.severity})`)
  .attr("stroke-dasharray", d => d.severity === "internal" ? "3,3" : null);

// Draw nodes
const node = g.append("g")
  .selectAll("g")
  .data(nodes)
  .join("g")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag", dragging)
    .on("end", dragEnd));

// Node circles
node.append("circle")
  .attr("r", d => {
    if (d.id === "fluid-sim" || d.id === "physics-tick" || d.id === "material-system") return 18;
    if (d.id.startsWith("sph") || d.id.startsWith("mpm") || d.id === "tier-rendering") return 12;
    return 14;
  })
  .attr("fill", d => {
    const c = groups[d.group]?.color || "#3a3a5e";
    return d.id === "fluid-sim" ? "#4a7aff" : c;
  })
  .attr("fill-opacity", 0.15)
  .attr("stroke", d => {
    const c = groups[d.group]?.color || "#3a3a5e";
    return d.id === "fluid-sim" ? "#4a7aff" : c;
  })
  .attr("stroke-width", d => {
    if (d.id === "fluid-sim" || d.id === "physics-tick") return 2.5;
    return 1.5;
  });

// Node labels
node.append("text")
  .text(d => d.label)
  .attr("text-anchor", "middle")
  .attr("dy", d => {
    const r = d.id === "fluid-sim" || d.id === "physics-tick" || d.id === "material-system" ? 18 : d.id.startsWith("sph") || d.id.startsWith("mpm") ? 12 : 14;
    return r + 14;
  })
  .attr("fill", "#808090")
  .attr("font-size", d => {
    if (d.id === "fluid-sim" || d.id === "physics-tick") return "11px";
    return "9px";
  })
  .attr("font-weight", d => d.id === "fluid-sim" ? "600" : "400")
  .attr("pointer-events", "none");

// ══════════════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════════════

const tooltip = document.getElementById("tooltip");
let hoveredNode = null;
let hiddenGroups = new Set();

node.on("mouseenter", (event, d) => {
  hoveredNode = d;
  highlightConnections(d);
  showTooltip(event, d);
}).on("mousemove", (event) => {
  moveTooltip(event);
}).on("mouseleave", () => {
  hoveredNode = null;
  resetHighlight();
  hideTooltip();
}).on("click", (event, d) => {
  showNodeDetail(d);
});

link.on("mouseenter", (event, d) => {
  showEdgeTooltip(event, d);
}).on("mousemove", (event) => {
  moveTooltip(event);
}).on("mouseleave", () => {
  hideTooltip();
}).on("click", (event, d) => {
  showConnectionDetail(d);
});

function highlightConnections(d) {
  const connectedIds = new Set();
  connectedIds.add(d.id);

  connections.forEach(c => {
    const src = typeof c.source === "object" ? c.source.id : c.source;
    const tgt = typeof c.target === "object" ? c.target.id : c.target;
    if (src === d.id) connectedIds.add(tgt);
    if (tgt === d.id) connectedIds.add(src);
  });

  node.select("circle")
    .attr("fill-opacity", n => connectedIds.has(n.id) ? 0.5 : 0.05)
    .attr("stroke-opacity", n => connectedIds.has(n.id) ? 1 : 0.15)
    .attr("stroke-width", n => {
      if (!connectedIds.has(n.id)) return 0.5;
      if (n.id === d.id) return 3;
      return 2;
    });

  node.select("text")
    .attr("fill", n => connectedIds.has(n.id) ? "#e0e0f0" : "#303040")
    .attr("font-weight", n => n.id === d.id ? "700" : connectedIds.has(n.id) ? "600" : "400");

  link
    .attr("stroke", c => {
      const src = typeof c.source === "object" ? c.source.id : c.source;
      const tgt = typeof c.target === "object" ? c.target.id : c.target;
      if (src === d.id || tgt === d.id) return "#fff";
      return "#1a1a2e";
    })
    .attr("stroke-opacity", c => {
      const src = typeof c.source === "object" ? c.source.id : c.source;
      const tgt = typeof c.target === "object" ? c.target.id : c.target;
      return (src === d.id || tgt === d.id) ? 0.9 : 0.08;
    })
    .attr("stroke-width", c => {
      const src = typeof c.source === "object" ? c.source.id : c.source;
      const tgt = typeof c.target === "object" ? c.target.id : c.target;
      return (src === d.id || tgt === d.id) ? 2.5 : 0.3;
    })
    .attr("marker-end", c => {
      const src = typeof c.source === "object" ? c.source.id : c.source;
      const tgt = typeof c.target === "object" ? c.target.id : c.target;
      return (src === d.id || tgt === d.id) ? "url(#arrow-highlight)" : `url(#arrow-${c.severity})`;
    });
}

function resetHighlight() {
  node.select("circle")
    .attr("fill-opacity", 0.15)
    .attr("stroke-opacity", 1)
    .attr("stroke-width", d => (d.id === "fluid-sim" || d.id === "physics-tick") ? 2.5 : 1.5);

  node.select("text")
    .attr("fill", "#808090")
    .attr("font-weight", d => d.id === "fluid-sim" ? "600" : "400");

  link
    .attr("stroke", d => d.severity === "critical" ? "#ff6b6b" : d.severity === "moderate" ? "#ffd166" : "#2a2a4e")
    .attr("stroke-width", d => d.severity === "critical" ? 1.8 : d.severity === "moderate" ? 1.2 : 0.7)
    .attr("stroke-opacity", d => d.severity === "internal" ? 0.4 : 0.6)
    .attr("marker-end", d => `url(#arrow-${d.severity})`)
    .attr("stroke-dasharray", d => d.severity === "internal" ? "3,3" : null);
}

function showTooltip(event, d) {
  const conns = [];
  connections.forEach(c => {
    const src = typeof c.source === "object" ? c.source.id : c.source;
    const tgt = typeof c.target === "object" ? c.target.id : c.target;
    if (src === d.id || tgt === d.id) {
      if (c.id <= 31) conns.push(c);
    }
  });

  // Deduplicate by connection id
  const seen = new Set();
  const uniqueConns = conns.filter(c => {
    if (seen.has(c.id)) return false;
    seen.add(c.id);
    return true;
  });

  let html = `<div class="tt-title">${d.label}</div>`;
  html += `<div class="tt-section">${d.section} &mdash; ${d.desc || ''}</div>`;

  if (uniqueConns.length > 0) {
    html += `<div class="tt-connections">`;
    uniqueConns.forEach(c => {
      html += `<div class="tt-conn-item">
        <span class="tt-conn-id">#${c.id}</span>
        <span class="tt-severity-${c.severity}">${c.name}</span>
      </div>`;
    });
    html += `</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  moveTooltip(event);
}

function showEdgeTooltip(event, d) {
  let html = `<div class="tt-title">${d.id <= 31 ? `Connection #${d.id}: ` : ''}${d.name}</div>`;
  html += `<div class="tt-section tt-severity-${d.severity}">${d.severity.toUpperCase()}</div>`;
  html += `<div style="margin-top:6px">${d.data}</div>`;
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  moveTooltip(event);
}

function moveTooltip(event) {
  let x = event.clientX + 14;
  let y = event.clientY + 14;
  if (x + 430 > window.innerWidth) x = event.clientX - 430;
  if (y + 200 > window.innerHeight) y = event.clientY - 200;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function hideTooltip() {
  tooltip.classList.remove("visible");
}

// Detail panel
function showNodeDetail(d) {
  const conns = [];
  connections.forEach(c => {
    const src = typeof c.source === "object" ? c.source.id : c.source;
    const tgt = typeof c.target === "object" ? c.target.id : c.target;
    if ((src === d.id || tgt === d.id) && c.id <= 31) {
      conns.push({ ...c, direction: src === d.id ? "outgoing" : "incoming" });
    }
  });

  const seen = new Set();
  const uniqueConns = conns.filter(c => {
    const key = c.id + c.direction;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  let html = `<div class="dp-title">${d.label}</div>`;
  html += `<div class="dp-severity ${d.group}" style="background:${groups[d.group]?.color || '#3a3a5e'}22;color:${groups[d.group]?.color || '#888'}">${d.group}</div>`;

  if (d.desc) {
    html += `<div class="dp-label">Description</div>`;
    html += `<div class="dp-value">${d.desc}</div>`;
  }

  if (uniqueConns.length > 0) {
    html += `<div class="dp-label">Connections (${uniqueConns.length})</div>`;
    uniqueConns.forEach(c => {
      const arrow = c.direction === "outgoing" ? "→" : "←";
      html += `<div style="margin-bottom:12px;padding:8px;background:rgba(255,255,255,0.02);border-radius:4px;border-left:3px solid ${c.severity === 'critical' ? '#ff6b6b' : '#ffd166'}">
        <div style="font-size:11px;font-weight:600;color:#e0e0e0">#${c.id} ${arrow} ${c.name}</div>
        <div style="font-size:10px;color:#808090;margin-top:3px">${c.data}</div>
      </div>`;
    });
  }

  html += `<div class="dp-ref">structure.md &sect;${d.section}</div>`;

  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-panel").classList.add("open");
}

function showConnectionDetail(d) {
  const src = typeof d.source === "object" ? d.source : nodes.find(n => n.id === d.source);
  const tgt = typeof d.target === "object" ? d.target : nodes.find(n => n.id === d.target);

  let html = `<div class="dp-title">${d.id <= 31 ? `Connection #${d.id}` : 'Internal'}: ${d.name}</div>`;
  html += `<div class="dp-severity ${d.severity}">${d.severity}</div>`;

  html += `<div class="dp-label">Source</div>`;
  html += `<div class="dp-value">${src?.label || '?'} (${src?.section || '?'})</div>`;

  html += `<div class="dp-label">Target</div>`;
  html += `<div class="dp-value">${tgt?.label || '?'} (${tgt?.section || '?'})</div>`;

  html += `<div class="dp-label">Data Flow</div>`;
  html += `<div class="dp-value">${d.data}</div>`;

  if (d.id <= 31) {
    html += `<div class="dp-ref">structure.md &sect;3 — Connection ${d.id}</div>`;
  }

  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-panel").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
}

function toggleGroup(groupKey) {
  if (hiddenGroups.has(groupKey)) {
    hiddenGroups.delete(groupKey);
  } else {
    hiddenGroups.add(groupKey);
  }

  document.querySelectorAll(".legend-item").forEach(el => {
    el.classList.toggle("dimmed", hiddenGroups.has(el.dataset.group));
  });

  node.attr("display", d => {
    if (hiddenGroups.has(d.group)) return "none";
    // Also hide internal nodes if "internal" is hidden
    if (hiddenGroups.has("internal") && ["sph-crafting","mpm-environment","particle-redis","optical-pipeline","secondary-particles","phase-transitions","scale-transitions","network-streaming","tier-rendering","sdf-collision"].includes(d.id)) return "none";
    return null;
  });

  link.attr("display", c => {
    if (hiddenGroups.has("internal") && c.severity === "internal") return "none";
    const src = typeof c.source === "object" ? c.source : nodes.find(n => n.id === c.source);
    const tgt = typeof c.target === "object" ? c.target : nodes.find(n => n.id === c.target);
    if (src && hiddenGroups.has(src.group)) return "none";
    if (tgt && hiddenGroups.has(tgt.group)) return "none";
    return null;
  });
}

// Drag
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragging(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// Tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Keyboard
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDetail();
});
</script>
</body>
</html>
